name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:  
  push:
    branches: [ main ]

permissions:
  contents: write 

jobs:
  update-stats:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        persist-credentials: true  

    - name: Download reliable stats
      run: |
        mkdir -p assets
        
        # فقط از سرویس‌های پایدار استفاده می‌کنیم
        curl -s -o assets/stats.svg "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=JavadTorabiKh&theme=github_dark"
        curl -s -o assets/trophy.svg "https://github-profile-trophy.vercel.app/?username=JavadTorabiKh&theme=github_dark&no-frame=true&row=2&column=4"
        
    - name: Commit and Push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add assets/
        
        if git diff-index --quiet HEAD --; then
          echo "No changes to commit"
        else
          git commit -m "📊 Auto-update GitHub stats - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
