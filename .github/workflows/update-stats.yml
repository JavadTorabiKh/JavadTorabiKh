name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:  
  push:
    branches: [ main ]

permissions:
  contents: write 

jobs:
  update-stats:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        persist-credentials: true  

    - name: Download reliable stats
      run: |
        mkdir -p assets
        
        curl -s -o assets/stats.svg "https://github-stats-alpha.vercel.app/api?username=JavadTorabiKh&cc=0d1117&tc=58a6ff&ic=ffffff&bc=30363d"
        curl -s -o assets/trophy.svg "https://github-readme-activity-graph.vercel.app/graph?username=JavadTorabiKh&theme=github-dark&hide_border=true&cache_seconds=86400&disable_animation=true"
        
    - name: Commit and Push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add assets/
        
        if git diff-index --quiet HEAD --; then
          echo "No changes to commit"
        else
          git commit -m "📊 Auto-update GitHub stats - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
